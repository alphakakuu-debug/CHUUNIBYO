<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TYPE-02 PROTO OS - TACTICAL</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #camera-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        :root {
            --hud-color: #ff0000; /* 初期は赤 */
        }

        #hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; color: var(--hud-color);
            text-shadow: 0 0 8px var(--hud-color);
            pointer-events: none;
            border: 8px solid var(--hud-color); /* 枠を少し細くして視界を確保 */
            box-sizing: border-box;
            transition: all 0.4s ease-in-out;
        }

        .info-box { position: absolute; font-size: 14px; line-height: 1.4; font-weight: bold; }
        .top-left { top: 30px; left: 30px; }
        .top-right { top: 30px; right: 30px; text-align: right; }
        .bottom-left { bottom: 30px; left: 30px; }
        .bottom-right { bottom: 30px; right: 30px; text-align: right; }

        /* 照準（reticle）のスタイルを削除しました */
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline muted></video>

    <div id="hud-overlay">
        <div class="info-box top-left">
            OP_TIME: <span id="timer">00:00:00</span><br>
            NET: ENCRYPTED
        </div>

        <div class="info-box top-right">
            <div id="system-status">STATUS: INITIALIZING...</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="info-box bottom-left">
            LAT: <span id="lat">---.----</span><br>
            LON: <span id="lon">---.----</span><br>
            GPS: <span id="gps-status">NO SIGNAL</span>
        </div>

        <div class="info-box bottom-right">
            UNIT: TYPE-02 PROTO<br>
            OS: KERNEL_P-MODEL_v3.0
        </div>
    </div>

    <script>
        const timerElement = document.getElementById('timer');
        const clockElement = document.getElementById('clock');
        const latElement = document.getElementById('lat');
        const lonElement = document.getElementById('lon');
        const gpsStatus = document.getElementById('gps-status');
        const systemStatus = document.getElementById('system-status');
        const video = document.getElementById('camera-view');

        let startTime = Date.now();

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        latElement.innerText = pos.coords.latitude.toFixed(4);
                        lonElement.innerText = pos.coords.longitude.toFixed(4);
                        gpsStatus.innerText = "LOCKED";
                        systemStatus.innerText = "STATUS: STABLE";
                        document.documentElement.style.setProperty('--hud-color', "#adff2f");
                    },
                    (err) => {
                        gpsStatus.innerText = "LOST";
                        systemStatus.innerText = "STATUS: DANGER";
                        document.documentElement.style.setProperty('--hud-color', "#ff0000");
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                systemStatus.innerText = "STATUS: CAM_ERROR";
            }
        }

        function updateTime() {
            const now = new Date();
            clockElement.innerText = now.toTimeString().split(' ')[0];
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            timerElement.innerText = `${h}:${m}:${s}`;
        }

        setInterval(updateTime, 1000);
        startCamera();
        startTracking();
    </script>
</body>
</html>

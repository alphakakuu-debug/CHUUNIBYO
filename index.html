<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TYPE-02 PROTO OS v2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 背面カメラ表示 */
        #camera-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* HUDオーバーレイ：充電状態で色が変わる変数 */
        :root {
            --hud-color: #ff0000; /* デフォルトは赤（警告） */
        }

        #hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            color: var(--hud-color);
            text-shadow: 0 0 5px var(--hud-color);
            pointer-events: none;
            /* 外枠（フレーム） */
            border: 15px solid var(--hud-color);
            box-sizing: border-box;
            transition: all 0.5s ease; /* 色の変化を滑らかに */
        }

        /* 右上の情報表示 */
        .status-bar {
            position: absolute;
            top: 30px;
            right: 30px;
            text-align: right;
            font-size: 16px;
            line-height: 1.5;
        }

        /* カウントアップタイマー（左上） */
        .mission-timer {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 16px;
        }

        /* 中央のレティクル */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 2px solid var(--hud-color);
            border-radius: 50%;
            opacity: 0.6;
        }

        /* 充電状態のラベル */
        #power-status {
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline muted></video>

    <div id="hud-overlay">
        <div class="mission-timer">
            OP_TIME: <span id="timer">00:00:00</span>
        </div>
        <div class="status-bar">
            <div id="power-status">STATUS: DISCONNECTED</div>
            <div id="clock">00:00:00</div>
        </div>
        <div class="reticle"></div>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const timerElement = document.getElementById('timer');
        const clockElement = document.getElementById('clock');
        const powerStatus = document.getElementById('power-status');
        const hudOverlay = document.getElementById('hud-overlay');

        let startTime = Date.now();

        // 1. カメラ起動
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラの起動に失敗しました。HTTPS接続を確認してください。");
            }
        }

        // 2. 時計とカウントアップの更新
        function updateTime() {
            const now = new Date();
            clockElement.innerText = now.toTimeString().split(' ')[0];

            // 経過時間計算
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            timerElement.innerText = `${h}:${m}:${s}`;
        }

        // 3. パワー（充電）状態の監視
        async function watchPower() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                
                const updateUI = () => {
                    if (battery.charging) {
                        // 充電中：緑
                        document.documentElement.style.setProperty('--hud-color', '#00ff00');
                        powerStatus.innerText = "STATUS: EXTERNAL POWER";
                    } else {
                        // バッテリー：赤
                        document.documentElement.style.setProperty('--hud-color', '#ff0000');
                        powerStatus.innerText = "STATUS: INTERNAL BATT";
                    }
                };

                updateUI();
                battery.addEventListener('chargingchange', updateUI);
            } else {
                // バッテリーAPI非対応（iPhoneの通常ブラウザ等）
                powerStatus.innerText = "STATUS: UNKNOWN";
            }
        }

        setInterval(updateTime, 1000);
        startCamera();
        watchPower();
    </script>
</body>
</html>

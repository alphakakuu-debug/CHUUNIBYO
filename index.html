<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtilityOS TYPE-PROTO V2.2</title>
    <style>
        :root {
            --util-cyan: #00f2ff;
            --util-red: #ff004c;
            --bg-black: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: var(--util-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* 背面のカメラ映像用 */
        #camera-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1); /* フロントカメラ用（鏡合わせ） */
        }

        /* UIレイヤー */
        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        .section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .block {
            background: var(--bg-black);
            border: 1px solid var(--util-cyan);
            padding: 8px;
            font-size: 10px;
            backdrop-filter: blur(2px);
        }

        .title {
            font-weight: bold;
            border-bottom: 1px solid var(--util-cyan);
            margin-bottom: 5px;
            display: block;
        }

        /* 中央のレティクル（照準） */
        #reticle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        #reticle::before, #reticle::after {
            content: '';
            position: absolute;
            background: var(--util-cyan);
        }

        /* 十字線 */
        #reticle::before { top: 50%; left: -10px; width: 120px; height: 1px; }
        #reticle::after { left: 50%; top: -10px; width: 1px; height: 120px; }

        .glitch {
            animation: glitch-anim 3s infinite;
        }

        @keyframes glitch-anim {
            0% { opacity: 1; }
            95% { opacity: 1; transform: scale(1); }
            96% { opacity: 0.8; transform: scale(1.02); }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- カメラ背景 -->
    <video id="camera-preview" autoplay playsinline></video>

    <div id="ui-layer">
        <!-- 上部：ステータスと時計 -->
        <div class="section">
            <div class="block glitch">
                <span class="title">SYSTEM STATUS</span>
                ID: TYPE-PROTO_01<br>
                LOC: SUZUKA_JP<br>
                MODE: SCANNING...
            </div>
            <div class="block">
                <span class="title">CHRONO</span>
                <div id="clock" style="font-size: 16px;">00:00:00</div>
                2026-05-12
            </div>
        </div>

        <!-- 中央：レティクル -->
        <div id="reticle"></div>

        <!-- 下部：位置情報とデバイス情報 -->
        <div class="section">
            <div class="block">
                <span class="title">GEOLOCATION</span>
                LAT: <span id="lat">---.---</span><br>
                LON: <span id="lon">---.---</span><br>
                ALT: <span id="alt">---</span>m
            </div>
            <div class="block" style="text-align: right;">
                <span class="title">DEVICE_PERF</span>
                BATT: <span id="batt">--</span>%<br>
                TEMP: NOMINAL<br>
                FPS: 60.0
            </div>
        </div>
    </div>

    <script>
        // カメラ起動
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                document.getElementById('camera-preview').srcObject = stream;
            } catch (err) {
                console.error("Camera Error: ", err);
            }
        }

        // 位置情報取得
        function updateLocation() {
            navigator.geolocation.watchPosition(pos => {
                document.getElementById('lat').innerText = pos.coords.latitude.toFixed(4);
                document.getElementById('lon').innerText = pos.coords.longitude.toFixed(4);
                document.getElementById('alt').innerText = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : '0.0';
            }, err => console.log(err), { enableHighAccuracy: true });
        }

        // バッテリー情報
        async function updateBattery() {
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                const update = () => {
                    document.getElementById('batt').innerText = Math.floor(battery.level * 100);
                };
                battery.addEventListener('levelchange', update);
                update();
            }
        }

        // 時計
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }

        setInterval(updateClock, 1000);
        updateClock();
        initCamera();
        updateLocation();
        updateBattery();
    </script>
</body>
</html>

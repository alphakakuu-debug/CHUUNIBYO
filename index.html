<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtilityOS TYPE-PROTO V2.5.1</title>
    <style>
        :root {
            --util-cyan: #00f2ff;
            --bg-black: rgba(0, 0, 0, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: var(--util-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            transition: box-shadow 0.2s ease;
        }

        #camera-preview {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .section { display: flex; justify-content: space-between; }

        .block {
            background: var(--bg-black);
            border-left: 3px solid var(--util-cyan);
            padding: 10px;
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: auto;
        }

        .title {
            font-size: 9px;
            color: rgba(0, 242, 255, 0.7);
            margin-bottom: 4px;
            display: block;
        }

        #reticle {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 160px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 2px;
            pointer-events: none;
        }

        #reticle::before {
            content: 'TARGETING_AUTO';
            position: absolute;
            top: -15px; left: 0;
            font-size: 9px;
        }

        .scan-line {
            position: fixed;
            width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.1);
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="bootSystem()">

    <div id="boot-screen">TOUCH TO INITIALIZE UtilityOS</div>

    <video id="camera-preview" autoplay playsinline></video>
    <div class="scan-line"></div>

    <div id="ui-layer">
        <div class="section">
            <div class="block">
                <span class="title">SYSTEM_LOG</span>
                <span id="system-status-text">KERNEL: STANDBY</span><br>
                LINK: EARPODS_CONNECTED<br>
                OS: UtilityOS_v2.5.1
            </div>
            <div class="block">
                <span class="title">TIMESTAMP</span>
                <div id="clock" style="font-size: 18px;">00:00:00</div>
                SUZUKA_PROJECT_2026
            </div>
        </div>

        <div id="reticle"></div>

        <div class="section">
            <div class="block">
                <span class="title">GEOLOCATION_DATA</span>
                LAT: <span id="lat">---.----</span><br>
                LON: <span id="lon">---.----</span><br>
                ALT: <span id="alt">---</span>m
            </div>
            <div class="block" style="text-align: right; border-left: none; border-right: 3px solid var(--util-cyan);">
                <span class="title">ENVIRONMENT</span>
                TEMP: <span id="ext-temp" style="font-weight: bold; color: #fff;">--.-</span>°C<br>
                VISUAL: ENABLED<br>
                LIGHT: 100%_MASKED<br>
                HUD: STABLE
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let isBooted = false;

        // ★ここに OpenWeatherMap の APIキー を入力をしてください
        const API_KEY = "d465f54b761e798103a827b981556cc7";

        // 前回気温を取得した時間を記録する変数
        let lastTempFetchTime = 0;

        async function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('system-status-text').innerText = "KERNEL: ACTIVE";

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            initCamera();
            initSoundMonitor();
            updateLocation();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                document.getElementById('camera-preview').srcObject = stream;
            } catch (err) { console.error("Camera Error: ", err); }
        }

        async function initSoundMonitor() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.fftSize = 1024;

                microphone.connect(audioContext.destination);
                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const average = values / array.length;
                    updateMonitorUI(average);
                };
            } catch (err) { console.error("MIC_ERROR:", err); }
        }

        function updateMonitorUI(volume) {
            const threshold = 40; 
            const statusElement = document.getElementById('system-status-text');
            if (volume > threshold) {
                document.body.style.boxShadow = "inset 0 0 100px rgba(255, 0, 0, 0.8)";
                statusElement.innerText = "!! EXTERNAL CONTACT DETECTED !!";
                setTimeout(() => {
                    document.body.style.boxShadow = "none";
                    statusElement.innerText = "SYSTEM: STEALTH_MODE";
                }, 1000);
            }
        }

        function updateLocation() {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                document.getElementById('lat').innerText = lat.toFixed(4);
                document.getElementById('lon').innerText = lon.toFixed(4);
                document.getElementById('alt').innerText = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : '0.0';

                // ★1分（60,000ミリ秒）以上経過していたら API で気温を取得
                const now = Date.now();
                if (now - lastTempFetchTime > 60000) { 
                    fetchTemperature(lat, lon);
                    lastTempFetchTime = now;
                }
            }, null, { enableHighAccuracy: true });
        }

        function fetchTemperature(lat, lon) {
            if (API_KEY === "YOUR_API_KEY_HERE") return;

            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.main && data.main.temp !== undefined) {
                        document.getElementById('ext-temp').innerText = data.main.temp.toFixed(1);
                    }
                })
                .catch(err => console.error("Temp API Error:", err));
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtilityOS TYPE-PROTO V2.3</title>
    <style>
        :root {
            --util-cyan: #00f2ff;
            --bg-black: rgba(0, 0, 0, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: var(--util-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* 背面カメラ映像 */
        #camera-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* アウトカメラなので反転(scaleX)は無し */
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .section {
            display: flex;
            justify-content: space-between;
        }

        .block {
            background: var(--bg-black);
            border-left: 3px solid var(--util-cyan);
            padding: 10px;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 9px;
            color: rgba(0, 242, 255, 0.7);
            margin-bottom: 4px;
            display: block;
        }

        /* 照準 */
        #reticle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 2px;
            pointer-events: none;
        }

        #reticle::before {
            content: 'TARGETING_AUTO';
            position: absolute;
            top: -15px;
            left: 0;
            font-size: 9px;
        }

        /* スキャンエフェクト */
        .scan-line {
            position: fixed;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.1);
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 5;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        // --- 常時モニター・エンジン ---
let audioContext;
let analyser;
let microphone;
let javascriptNode;

async function initSoundMonitor() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

        analyser.smoothingTimeConstant = 0.3;
        analyser.fftSize = 1024;

        microphone.connect(analyser);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        javascriptNode.onaudioprocess = function() {
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            let values = 0;

            for (let i = 0; i < array.length; i++) {
                values += array[i];
            }

            const average = values / array.length;
            updateMonitorUI(average);
        };
    } catch (err) {
        console.error("MIC_ERROR:", err);
    }
}

// 親フラ検知・UI反映
function updateMonitorUI(volume) {
    const threshold = 40; // ★ここを調整してノックに反応する感度を決める
    const statusElement = document.getElementById('system-status-text'); // 既存のステータス表示部
    
    if (volume > threshold) {
        // 警告：画面全体を薄く赤くフラッシュさせる
        document.body.style.boxShadow = "inset 0 0 100px rgba(255, 0, 0, 0.8)";
        if(statusElement) statusElement.innerText = "!! EXTERNAL CONTACT DETECTED !!";
        
        // 1秒後に戻す
        setTimeout(() => {
            document.body.style.boxShadow = "none";
            if(statusElement) statusElement.innerText = "SYSTEM: STEALH_MODE";
        }, 1000);
    }
}

// 画面タップでモニター開始（ブラウザの制限対策）
document.body.addEventListener('click', () => {
    if (!audioContext) {
        initSoundMonitor();
        console.log("MONITORING_SYSTEM: ONLINE");
    }
        });
    </style>
</head>
<body>

    <video id="camera-preview" autoplay playsinline></video>
    <div class="scan-line"></div>

    <div id="ui-layer">
        <div class="section">
            <div class="block">
                <span class="title">SYSTEM_LOG</span>
                KERNEL: ACTIVE<br>
                LINK: EARPODS_CONNECTED<br>
                OS: UtilityOS_v2.3
            </div>
            <div class="block">
                <span class="title">TIMESTAMP</span>
                <div id="clock" style="font-size: 18px;">00:00:00</div>
                SUZUKA_PROJECT_2026
            </div>
        </div>

        <div id="reticle"></div>

        <div class="section">
            <div class="block">
                <span class="title">GEOLOCATION_DATA</span>
                LAT: <span id="lat">---.----</span><br>
                LON: <span id="lon">---.----</span><br>
                ALT: <span id="alt">---</span>m
            </div>
            <div class="block" style="text-align: right; border-left: none; border-right: 3px solid var(--util-cyan);">
                <span class="title">ENVIRONMENT</span>
                VISUAL: ENABLED<br>
                LIGHT: 100%_MASKED<br>
                HUD: STABLE
            </div>
        </div>
    </div>

    <script>
        async function initCamera() {
            try {
                // 'environment' でアウトカメラを指定
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                document.getElementById('camera-preview').srcObject = stream;
            } catch (err) {
                console.error("Camera Error: ", err);
            }
        }

        function updateLocation() {
            navigator.geolocation.watchPosition(pos => {
                document.getElementById('lat').innerText = pos.coords.latitude.toFixed(4);
                document.getElementById('lon').innerText = pos.coords.longitude.toFixed(4);
                document.getElementById('alt').innerText = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : '0.0';
            }, null, { enableHighAccuracy: true });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }

        setInterval(updateClock, 1000);
        updateClock();
        initCamera();
        updateLocation();
    </script>
</body>
</html>

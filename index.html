<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtilityOS TYPE-PROTO V3.0.0</title>
    <style>
        :root {
            --util-cyan: #00f2ff;
            --bg-black: rgba(0, 0, 0, 0.65);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: var(--util-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            transition: box-shadow 0.2s ease;
        }

        #camera-preview {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .section { display: flex; justify-content: space-between; }

        .block {
            background: var(--bg-black);
            border-left: 3px solid var(--util-cyan);
            padding: 8px 12px;
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }

        .title {
            font-size: 9px;
            color: rgba(0, 242, 255, 0.7);
            margin-bottom: 4px;
            display: block;
        }

        /* --- 動く照準（レティクル） --- */
        #reticle-container {
            position: fixed;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 180px; height: 180px;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reticle-ring {
            position: absolute;
            width: 100%; height: 100%;
            border: 1px dashed rgba(0, 242, 255, 0.4);
            border-radius: 50%;
            animation: rotateRing 12s linear infinite;
        }

        .reticle-core {
            width: 80px; height: 80px;
            border: 1px solid var(--util-cyan);
            border-radius: 4px;
            animation: pulseCore 2s ease-in-out infinite alternate;
        }

        @keyframes rotateRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseCore { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 0.8; transform: scale(1.05); } }

        /* --- 動くスキャンライン --- */
        .scan-line {
            position: fixed;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--util-cyan), transparent);
            box-shadow: 0 0 15px var(--util-cyan);
            top: 0;
            animation: scan 3.5s ease-in-out infinite;
            z-index: 5;
            pointer-events: none;
            opacity: 0.7;
        }

        @keyframes scan {
            0% { top: -5%; }
            50% { top: 105%; }
            100% { top: -5%; }
        }

        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .voice-active { color: #fff; font-weight: bold; background: rgba(0,242,255,0.3); padding: 2px 4px; }
    </style>
</head>
<body onclick="bootSystem()">

    <div id="boot-screen">TOUCH TO INITIALIZE UtilityOS V3.0.0</div>

    <video id="camera-preview" autoplay playsinline></video>
    <div class="scan-line"></div>

    <div id="ui-layer">
        <!-- 上部ヘッダー -->
        <div class="section">
            <div class="block">
                <span class="title">SYSTEM_LOG</span>
                <span id="system-status-text">KERNEL: STANDBY</span><br>
                BATTERY: <span id="battery-status" style="color: #fff;">--%</span><br>
                OS: UtilityOS_v3.0.0
            </div>
            <div class="block">
                <span class="title">TIMESTAMP & HEADING</span>
                <div id="clock" style="font-size: 18px;">00:00:00</div>
                DIR: <span id="heading-val" style="color: #fff; font-weight: bold;">---° --</span>
            </div>
        </div>

        <!-- 動くグラフィック照準 -->
        <div id="reticle-container">
            <div class="reticle-ring"></div>
            <div class="reticle-core"></div>
        </div>

        <!-- 中央：音声認識状態表示 -->
        <div class="section" style="justify-content: center;">
            <div class="block" style="text-align: center; min-width: 260px;">
                <span class="title">VOICE_INPUT_MONITOR</span>
                RECOGNIZED: <span id="voice-cmd" class="voice-active">LISTENING...</span>
            </div>
        </div>

        <!-- 下部フッター -->
        <div class="section">
            <div class="block">
                <span class="title">GEOLOCATION_DATA</span>
                LAT: <span id="lat">---.----</span><br>
                LON: <span id="lon">---.----</span><br>
                ALT: <span id="alt">---</span>m
            </div>
            <div class="block" style="text-align: right; border-left: none; border-right: 3px solid var(--util-cyan);">
                <span class="title">ENVIRONMENT</span>
                TEMP: <span id="ext-temp" style="font-weight: bold; color: #fff;">--.-</span>°C<br>
                VISUAL: ENABLED<br>
                HUD: STABLE
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let isBooted = false;

        const API_KEY = "d465f54b761e798103a827b981556cc7";
        let lastTempFetchTime = 0;

        async function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('system-status-text').innerText = "KERNEL: ACTIVE";

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            initCamera();
            initSoundMonitor();
            updateLocation();
            initVoiceRecognition();
            initBatteryMonitor();
            initCompass();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                document.getElementById('camera-preview').srcObject = stream;
            } catch (err) { console.error("Camera Error: ", err); }
        }

        async function initSoundMonitor() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.fftSize = 1024;
                microphone.connect(analyser);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const average = values / array.length;
                    updateMonitorUI(average);
                };
            } catch (err) { console.error("MIC_ERROR:", err); }
        }

        function updateMonitorUI(volume) {
            const threshold = 40; 
            const statusElement = document.getElementById('system-status-text');
            if (volume > threshold) {
                document.body.style.boxShadow = "inset 0 0 100px rgba(255, 0, 0, 0.8)";
                statusElement.innerText = "!! EXTERNAL CONTACT DETECTED !!";
                setTimeout(() => {
                    document.body.style.boxShadow = "none";
                    statusElement.innerText = "SYSTEM: STEALTH_MODE";
                }, 1000);
            }
        }

        function updateLocation() {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('lat').innerText = lat.toFixed(4);
                document.getElementById('lon').innerText = lon.toFixed(4);
                document.getElementById('alt').innerText = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : '0.0';

                const now = Date.now();
                if (now - lastTempFetchTime > 60000) { 
                    fetchTemperature(lat, lon);
                    lastTempFetchTime = now;
                }
            }, null, { enableHighAccuracy: true });
        }

        function fetchTemperature(lat, lon) {
            if (!API_KEY) return;
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.main && data.main.temp !== undefined) {
                        document.getElementById('ext-temp').innerText = data.main.temp.toFixed(1);
                    }
                })
                .catch(err => console.error("Temp Fetch Error:", err));
        }

        /* 方位磁針（ジャイロ・コンパス）機能 */
        function initCompass() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', function(e) {
                    let heading = e.alpha;
                    if (e.webkitCompassHeading) {
                        heading = e.webkitCompassHeading; // iOS用
                    }
                    if (heading !== null) {
                        const deg = Math.round(heading);
                        const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                        const dir = dirs[Math.round(deg / 45) % 8];
                        document.getElementById('heading-val').innerText = `${deg}° ${dir}`;
                    }
                }, true);
            }
        }

        /* バッテリーモニター機能 */
        function initBatteryMonitor() {
            if (navigator.getBattery) {
                navigator.getBattery().then(battery => {
                    const updateBattery = () => {
                        const level = Math.round(battery.level * 100);
                        const charging = battery.charging ? " (CHG)" : "";
                        document.getElementById('battery-status').innerText = `${level}%${charging}`;
                    };
                    updateBattery();
                    battery.addEventListener('levelchange', updateBattery);
                    battery.addEventListener('chargingchange', updateBattery);
                });
            } else {
                document.getElementById('battery-status').innerText = "N/A";
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function initVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voice-cmd').innerText = "NOT_SUPPORTED";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const lastIndex = event.results.length - 1;
                const transcript = event.results[lastIndex][0].transcript.trim();
                document.getElementById('voice-cmd').innerText = `"${transcript}"`;
            };

            recognition.onerror = (err) => { console.error("Speech Error:", err); };
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TYPE-02 PROTO OS v3</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #camera-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        :root { --hud-color: #adff2f; /* 黄緑をデフォルトに設定 */ }

        #hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; color: var(--hud-color);
            text-shadow: 0 0 5px var(--hud-color);
            pointer-events: none;
            border: 10px solid var(--hud-color);
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        /* 四隅の情報配置 */
        .info-box { position: absolute; font-size: 14px; line-height: 1.4; }
        .top-left { top: 25px; left: 25px; }
        .top-right { top: 25px; right: 25px; text-align: right; }
        .bottom-left { bottom: 25px; left: 25px; }
        .bottom-right { bottom: 25px; right: 25px; text-align: right; }

        .reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border: 1px solid var(--hud-color); border-radius: 50%;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline muted></video>

    <div id="hud-overlay">
        <div class="info-box top-left">
            OP_TIME: <span id="timer">00:00:00</span><br>
            SIGNAL: <span id="signal">ENCRYPTED</span>
        </div>

        <div class="info-box top-right">
            <div id="power-status">STATUS: STABLE</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="info-box bottom-left">
            LAT: <span id="lat">---.----</span><br>
            LON: <span id="lon">---.----</span><br>
            LOC: <span id="loc-status">ACQUIRING...</span>
        </div>

        <div class="info-box bottom-right">
            KERNEL: P-MODEL_v3.0<br>
            ID: TYPE-02_PROTO
        </div>

        <div class="reticle"></div>
    </div>

    <script>
        const timerElement = document.getElementById('timer');
        const clockElement = document.getElementById('clock');
        const latElement = document.getElementById('lat');
        const lonElement = document.getElementById('lon');
        const locStatus = document.getElementById('loc-status');
        const powerStatus = document.getElementById('power-status');

        let startTime = Date.now();
        let modeIndex = 0;
        const modes = [
            { label: "STATUS: STABLE", color: "#adff2f" },
            { label: "STATUS: OVERDRIVE", color: "#00ffff" },
            { label: "STATUS: DANGER", color: "#ff0000" }
        ];

        // 1. 位置情報の取得
        function startGps() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    latElement.innerText = position.coords.latitude.toFixed(4);
                    lonElement.innerText = position.coords.longitude.toFixed(4);
                    locStatus.innerText = "SIGNAL: LOCKED";
                }, (err) => {
                    locStatus.innerText = "SIGNAL: LOST";
                }, { enableHighAccuracy: true });
            } else {
                locStatus.innerText = "GPS NOT SUPPORTED";
            }
        }

        // 2. モード切替（タップ）
        document.body.addEventListener('click', () => {
            modeIndex = (modeIndex + 1) % modes.length;
            document.documentElement.style.setProperty('--hud-color', modes[modeIndex].color);
            powerStatus.innerText = modes[modeIndex].label;
        });

        // 3. カメラと時間更新
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('camera-view').srcObject = stream;
            } catch (err) { alert("カメラエラー"); }
            
            setInterval(() => {
                const now = new Date();
                clockElement.innerText = now.toTimeString().split(' ')[0];
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
                const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                timerElement.innerText = `${h}:${m}:${s}`;
            }, 1000);
            
            startGps();
        }

        init();
    </script>
</body>
</html>

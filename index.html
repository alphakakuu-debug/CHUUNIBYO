<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UtilityOS TYPE-PROTO V4.2.1</title>
    <style>
        :root {
            --util-cyan: #00f2ff;
            --bg-black: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: var(--util-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #camera-preview {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .section { display: flex; justify-content: space-between; }

        .block {
            background: var(--bg-black);
            border-left: 3px solid var(--util-cyan);
            padding: 8px 12px;
            font-size: 11px;
            letter-spacing: 1px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }

        .title {
            font-size: 9px;
            color: rgba(0, 242, 255, 0.7);
            margin-bottom: 4px;
            display: block;
        }

        #top-left-block {
            min-width: 200px;
            max-width: 230px;
        }

        #waveform-canvas {
            width: 100%;
            height: 28px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3);
            margin-bottom: 6px;
        }

        #memo-logs {
            font-size: 9px;
            color: #fff;
            max-height: 48px;
            overflow: hidden;
            line-height: 1.3;
        }

        #crosshair {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            pointer-events: none;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 242, 255, 0.4);
        }

        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .voice-active { 
            color: #fff; 
            font-weight: bold; 
            background: rgba(0,242,255,0.3); 
            padding: 2px 4px; 
            display: inline-block;
            margin-bottom: 6px;
            word-break: break-all;
        }
    </style>
</head>
<body onclick="bootSystem()">

    <div id="boot-screen">TOUCH TO INITIALIZE UtilityOS V4.2.1</div>

    <video id="camera-preview" autoplay playsinline></video>
    <div id="crosshair"></div>

    <div id="ui-layer">
        <div class="section">
            <div class="block" id="top-left-block">
                <span class="title">VOICE_INPUT_MONITOR</span>
                <span id="voice-cmd" class="voice-active">LISTENING...</span>

                <span class="title">AUDIO WAVEFORM</span>
                <canvas id="waveform-canvas"></canvas>

                <span class="title">VOICE MEMO LOGS</span>
                <div id="memo-logs">
                    <div>-- NO LOGS YET --</div>
                </div>
            </div>

            <div class="block">
                <span class="title">TIME & SESSION</span>
                <div id="clock" style="font-size: 18px; font-weight: bold;">00:00:00</div>
                TIMER: <span id="session-timer" style="color: #fff;">00:00</span>
            </div>
        </div>

        <div class="section">
            <div class="block">
                <span class="title">GPS_DATA</span>
                LAT: <span id="lat">---.----</span><br>
                LON: <span id="lon">---.----</span><br>
                ALT: <span id="alt">---</span>m
            </div>
            <div class="block" style="text-align: right; border-left: none; border-right: 3px solid var(--util-cyan);">
                <span class="title">ENVIRONMENT</span>
                TEMP: <span id="ext-temp" style="font-weight: bold; color: #fff;">--.-</span>°C<br>
                WEATHER: <span id="weather-desc">LOADING</span><br>
                HUD: STABLE
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let isBooted = false;
        let startTime;

        const API_KEY = "d465f54b761e798103a827b981556cc7";
        let lastTempFetchTime = 0;

        const memoLogs = [];

        async function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            
            document.getElementById('boot-screen').style.display = 'none';

            // 【低遅延対策1】latencyHint: 'interactive' で最速モード起動
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioCtx({ latencyHint: 'interactive' });
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            startTime = Date.now();
            setInterval(updateSessionTimer, 1000);

            initCamera();
            initSoundAndAudioPass();
            updateLocation();
            initVoiceRecognition();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                document.getElementById('camera-preview').srcObject = stream;
            } catch (err) { console.error("Camera Error: ", err); }
        }

        /* 超低遅延 集音 ＆ パススルー設定 */
        async function initSoundAndAudioPass() {
            try {
                // 【低遅延対策2】重いDSP処理（エコーキャンセル等）をOFFにして処理遅延を削る
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        latency: 0
                    } 
                });

                const microphone = audioContext.createMediaStreamSource(stream);
                
                // 【低遅延対策3】FFTサイズを32に小さくしてバッファ待ちを最小化
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 32;

                // ダイレクト出力（集音）
                microphone.connect(audioContext.destination);
                microphone.connect(analyser);

                drawWaveform(analyser);

            } catch (err) { 
                console.error("MIC_ERROR:", err);
            }
        }

        function drawWaveform(analyser) {
            const canvas = document.getElementById('waveform-canvas');
            const ctx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function render() {
                requestAnimationFrame(render);
                analyser.getByteFrequencyData(dataArray);

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 1.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    ctx.fillStyle = '#00f2ff';
                    ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                    x += barWidth;
                }
            }
            render();
        }

        function updateLocation() {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('lat').innerText = lat.toFixed(4);
                document.getElementById('lon').innerText = lon.toFixed(4);
                document.getElementById('alt').innerText = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : '0.0';

                const now = Date.now();
                if (now - lastTempFetchTime > 60000) { 
                    fetchTemperature(lat, lon);
                    lastTempFetchTime = now;
                }
            }, null, { enableHighAccuracy: true });
        }

        function fetchTemperature(lat, lon) {
            if (!API_KEY) return;
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.main && data.main.temp !== undefined) {
                        document.getElementById('ext-temp').innerText = data.main.temp.toFixed(1);
                    }
                    if (data.weather && data.weather[0]) {
                        document.getElementById('weather-desc').innerText = data.weather[0].main.toUpperCase();
                    }
                })
                .catch(err => console.error("Temp Fetch Error:", err));
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateSessionTimer() {
            if (!startTime) return;
            const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${mins}:${secs}`;
        }

        function initVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voice-cmd').innerText = "NOT_SUPPORTED";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const lastIndex = event.results.length - 1;
                const transcript = event.results[lastIndex][0].transcript.trim();
                
                document.getElementById('voice-cmd').innerText = `"${transcript}"`;
                addVoiceLog(transcript);
            };

            recognition.onerror = (err) => { console.error("Speech Error:", err); };
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        function addVoiceLog(text) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            memoLogs.unshift(`[${timeStr}] ${text}`);
            if (memoLogs.length > 3) memoLogs.pop();

            const logsContainer = document.getElementById('memo-logs');
            logsContainer.innerHTML = memoLogs.map(log => `<div>${log}</div>`).join('');
        }
    </script>
</body>
</html>
